name: Sync GitHub to Hugging Face Hub

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          lfs: true

      - name: Sync GitHub to Hugging Face Hub
        uses: huggingface/hub-sync@v0.2.0
        with:
          github_repo_id: ${{ github.repository }}
          huggingface_repo_id: insidegubbio/gh.condottiero
          hf_token: ${{ secrets.HF_TOKEN }}
          repo_type: space
          space_sdk: docker
          private: false
